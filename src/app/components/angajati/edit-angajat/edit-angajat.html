<div class="container my-5">
  <h1 class="mb-3">Editare Angajat</h1>
  <div class="row">
    <div class="col-6">
      <form #form="ngForm">
        
        <div class="mb-3">
          <label for="id">Id</label>
          <input type="text" class="form-control" id="id" readonly name="id" [(ngModel)]="detaliiAngajat.id">
        </div>

        <div class="mb-3">
          <label for="name">Nume</label>
          <input type="text" class="form-control" id="name" name="name" [(ngModel)]="detaliiAngajat.name">
        </div>

        <div class="mb-3">
          <label for="email">Email</label>
          <input type="email" class="form-control" id="email" name="email" [(ngModel)]="detaliiAngajat.email">
        </div>

        <div class="mb-3">
          <label for="telefon">Telefon</label>
          <input type="number" class="form-control" id="telefon" name="telefon" [(ngModel)]="detaliiAngajat.phone">
        </div>

        <div class="mb-3">
          <label for="salar">Salar</label>
          <input type="number" class="form-control" id="salar" name="salar" [(ngModel)]="detaliiAngajat.salary">
        </div>

        <div class="mb-3">
          <label for="departament">Departament</label>
          <input type="text" class="form-control" id="departament" name="departament" [(ngModel)]="detaliiAngajat.department">
        </div>

        <button type="submit" class="btn btn-primary">Save</button>
        
      </form>
    </div>
  </div>
</div>
